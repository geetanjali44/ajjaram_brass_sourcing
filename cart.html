<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cart</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    min-height:100vh;
    background:#f5deb3;
    padding-bottom:35px;
}

/* HEADER */
header{
    background:#8b5e3c;
    color:white;
    padding:16px;
    display:flex;
    align-items:center;
    gap:14px;
    position:sticky;
    top:0;
    z-index:100;
}

.back{
    color:white;
    text-decoration:none;
    font-size:22px;
}

header h2{
    font-size:20px;
}

/* MAIN */
.cart-page{
    width:94%;
    max-width:1100px;
    margin:18px auto;
    display:grid;
    grid-template-columns:1fr 330px;
    gap:18px;
    align-items:start;
}

/* LEFT ITEMS */
.cart-list{
    display:flex;
    flex-direction:column;
    gap:14px;
    min-width:0;
}

.cart-item{
    background:#fff7e8;
    border-radius:14px;
    padding:14px;
    display:flex;
    gap:14px;
    box-shadow:0 4px 14px rgba(0,0,0,.10);
}

.cart-item img{
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:12px;
    background:#eee;
    flex-shrink:0;
}

.item-info{
    flex:1;
}

.item-info h3{
    font-size:17px;
    margin-bottom:8px;
    color:#222;
}

.item-price{
    color:#8b5e3c;
    font-size:18px;
    font-weight:bold;
    margin-bottom:10px;
}

.qty-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
}

.qty-btn{
    width:30px;
    height:30px;
    border:none;
    border-radius:50%;
    background:#8b5e3c;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.qty-num{
    min-width:24px;
    text-align:center;
    font-weight:bold;
}

.remove-btn{
    border:none;
    background:#fee2e2;
    color:#b91c1c;
    padding:8px 14px;
    border-radius:20px;
    font-weight:bold;
    cursor:pointer;
}

/* PRICE DETAILS */
.price-card{
    background:#fff7e8;
    border-radius:14px;
    padding:16px;
    height:max-content;
    box-shadow:0 4px 14px rgba(0,0,0,.10);
    position:sticky;
    top:85px;
}

.price-card h3{
    font-size:18px;
    margin-bottom:14px;
    color:#4b2500;
}

.price-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:12px;
    font-size:15px;
    color:#333;
}

.price-row.total{
    border-top:1px solid #ddd;
    padding-top:14px;
    font-size:19px;
    font-weight:bold;
    color:#111;
}

.discount{
    color:#15803d;
}

.place-btn{
    width:100%;
    margin-top:16px;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#ff9f00;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.place-btn:active{
    transform:scale(.98);
}

/* EMPTY */
.empty{
    background:#fff7e8;
    border-radius:16px;
    padding:40px 20px;
    text-align:center;
    box-shadow:0 4px 14px rgba(0,0,0,.10);
}

.empty i{
    font-size:52px;
    color:#8b5e3c;
    margin-bottom:14px;
}

.empty h3{
    margin-bottom:10px;
}

.empty a{
    display:inline-block;
    margin-top:15px;
    background:#8b5e3c;
    color:white;
    text-decoration:none;
    padding:12px 22px;
    border-radius:25px;
    font-weight:bold;
}

/* MOBILE BOTTOM BAR HIDDEN */
.mobile-total-bar{
    display:none;
}

/* MOBILE */
@media(max-width:768px){
    body{
        padding-bottom:25px;
    }

    .cart-page{
        display:block;
        width:94%;
        margin:14px auto;
    }

    .cart-list{
        gap:12px;
    }

    .cart-item{
        gap:10px;
        padding:12px;
    }

    .cart-item img{
        width:95px;
        height:95px;
    }

    .item-info h3{
        font-size:14px;
    }

    .item-price{
        font-size:16px;
    }

    .qty-btn{
        width:28px;
        height:28px;
        font-size:16px;
    }

    .remove-btn{
        padding:7px 12px;
        font-size:13px;
    }

    /* SHOW PRICE DETAILS IN MOBILE */
    .price-card{
        display:block !important;
        position:relative;
        top:0;
        width:100%;
        margin-top:16px;
        margin-bottom:20px;
    }

    /* DON'T SHOW BOTTOM BAR */
    .mobile-total-bar{
        display:none !important;
    }
}
</style>
</head>

<body>

<header>
    <a href="home.html" class="back">
        <i class="fa-solid fa-arrow-left"></i>
    </a>
    <h2>My Cart</h2>
</header>

<div class="cart-page">

    <div class="cart-list" id="cartContainer"></div>

    <div class="price-card" id="priceCard">
        <h3>Price Details</h3>

        <div class="price-row">
            <span>Price (<span id="itemCount">0</span> items)</span>
            <b id="itemsTotal">₹0</b>
        </div>

        <div class="price-row">
            <span>Discount</span>
            <b class="discount">₹0</b>
        </div>

        <div class="price-row">
            <span>Delivery Charges</span>
            <b class="discount">FREE</b>
        </div>

        <div class="price-row total">
            <span>Total Amount</span>
            <b id="grandTotal">₹0</b>
        </div>

        <button class="place-btn" onclick="placeCartOrder()">
            Place Order
        </button>
    </div>

</div>

<div class="mobile-total-bar" id="mobileBar">
    <div>
        <p>Total Amount</p>
        <h3 id="mobileTotal">₹0</h3>
    </div>

    <button onclick="placeCartOrder()">Place Order</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const container = document.getElementById("cartContainer");
const priceCard = document.getElementById("priceCard");
const mobileBar = document.getElementById("mobileBar");

function cleanPrice(value){
    return Number(String(value).replace(/[^\d.]/g, "")) || 0;
}

function formatPrice(amount){
    return "₹" + Number(amount).toLocaleString("en-IN");
}

function renderCart(){
    container.innerHTML = "";

    if(cart.length === 0){
        container.innerHTML = `
            <div class="empty">
                <i class="fa-solid fa-cart-shopping"></i>
                <h3>Your cart is empty</h3>
                <p>Add products to your cart.</p>
                <a href="home.html">Shop Now</a>
            </div>
        `;

        priceCard.style.display = "none";
        mobileBar.style.display = "none";
        return;
    }

    priceCard.style.display = "";
    mobileBar.style.display = "";

    cart.forEach((item, index) => {
        if(!item.qty){
            item.qty = 1;
        }

        const productImage = item.img || item.image || "";
        const price = cleanPrice(item.price);

        const div = document.createElement("div");
        div.className = "cart-item";

        div.innerHTML = `
            <img src="${productImage}" alt="${item.name}">

            <div class="item-info">
                <h3>${item.name}</h3>

                <div class="item-price">
                    ${formatPrice(price)}
                </div>

                <div class="qty-row">
                    <button class="qty-btn" onclick="decreaseQty(${index})">−</button>
                    <span class="qty-num">${item.qty}</span>
                    <button class="qty-btn" onclick="increaseQty(${index})">+</button>
                </div>

                <button class="remove-btn" onclick="removeItem(${index})">
                    Remove
                </button>
            </div>
        `;

        container.appendChild(div);
    });

    localStorage.setItem("cart", JSON.stringify(cart));
    updatePriceDetails();
}

function updatePriceDetails(){
    let total = 0;
    let count = 0;

    cart.forEach(item => {
        const price = cleanPrice(item.price);
        const qty = Number(item.qty) || 1;

        total += price * qty;
        count += qty;
    });

    document.getElementById("itemCount").innerText = count;
    document.getElementById("itemsTotal").innerText = formatPrice(total);
    document.getElementById("grandTotal").innerText = formatPrice(total);
    document.getElementById("mobileTotal").innerText = formatPrice(total);
}

function increaseQty(index){
    cart[index].qty = (Number(cart[index].qty) || 1) + 1;
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

function decreaseQty(index){
    cart[index].qty = Number(cart[index].qty) || 1;

    if(cart[index].qty > 1){
        cart[index].qty--;
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

function removeItem(index){
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

function placeCartOrder(){
    if(cart.length === 0){
        alert("Cart is empty");
        return;
    }

    let total = 0;

    cart.forEach(item => {
        total += cleanPrice(item.price) * (Number(item.qty) || 1);
    });

    const firstItem = cart[0];

    localStorage.setItem("cartCheckoutItems", JSON.stringify(cart));
    localStorage.setItem("cartCheckoutTotal", total);

    const paymentData =
        "name=" + encodeURIComponent("Cart Order (" + cart.length + " items)") +
        "&price=" + encodeURIComponent(total) +
        "&old=" +
        "&img=" + encodeURIComponent(firstItem.img || firstItem.image || "");

    const isLoggedIn = localStorage.getItem("ajjaramLoggedIn") === "true";

    if(isLoggedIn){
        window.location.href = "payment.html?" + paymentData;
    }else{
        window.location.href = "loginpage.html?" + paymentData;
    }
}

renderCart();
</script>

</body>
</html>
